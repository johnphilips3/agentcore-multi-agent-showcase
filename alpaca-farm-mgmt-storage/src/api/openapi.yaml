openapi: 3.0.3
info:
  title: Alpaca Herd Management API
  description: REST API for managing alpaca herd data including animals, health records, breeding information, and management activities
  version: 1.0.0
  contact:
    name: Alpaca Herd Management System
    email: support@alpacaherd.com

servers:
  - url: http://localhost:3000/api/v1
    description: Development server
  - url: https://api.alpacaherd.com/v1
    description: Production server

paths:
  # Alpaca endpoints
  /alpacas:
    get:
      summary: List all alpacas
      description: Retrieve a paginated list of alpacas with optional filtering
      operationId: listAlpacas
      tags:
        - Alpacas
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: name
          in: query
          description: Filter by alpaca name (partial match)
          schema:
            type: string
        - name: gender
          in: query
          description: Filter by gender
          schema:
            type: string
            enum: [male, female]
        - name: color
          in: query
          description: Filter by color
          schema:
            type: string
        - name: registrationNumber
          in: query
          description: Filter by registration number
          schema:
            type: string
        - name: birthDateFrom
          in: query
          description: Filter by birth date from (ISO date)
          schema:
            type: string
            format: date
        - name: birthDateTo
          in: query
          description: Filter by birth date to (ISO date)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Alpaca'
                      pagination:
                        $ref: '#/components/schemas/PaginationInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new alpaca
      description: Add a new alpaca to the herd
      operationId: createAlpaca
      tags:
        - Alpacas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlpacaRequest'
      responses:
        '201':
          description: Alpaca created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Alpaca'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alpacas/{id}:
    get:
      summary: Get alpaca by ID
      description: Retrieve a specific alpaca by its ID
      operationId: getAlpaca
      tags:
        - Alpacas
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Alpaca'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update alpaca
      description: Update an existing alpaca's information
      operationId: updateAlpaca
      tags:
        - Alpacas
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAlpacaRequest'
      responses:
        '200':
          description: Alpaca updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Alpaca'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete alpaca
      description: Remove an alpaca from the herd
      operationId: deleteAlpaca
      tags:
        - Alpacas
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Alpaca deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alpacas/{id}/lineage:
    get:
      summary: Get alpaca lineage
      description: Retrieve the family tree for a specific alpaca
      operationId: getAlpacaLineage
      tags:
        - Alpacas
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: generations
          in: query
          description: Number of generations to include (default 3)
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 3
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LineageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alpacas/{id}/offspring:
    get:
      summary: Get alpaca offspring
      description: Retrieve all offspring for a specific alpaca
      operationId: getAlpacaOffspring
      tags:
        - Alpacas
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Alpaca'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alpacas/search:
    get:
      summary: Search alpacas
      description: Advanced search for alpacas with multiple criteria
      operationId: searchAlpacas
      tags:
        - Alpacas
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: q
          in: query
          description: Search query (searches name, registration number)
          schema:
            type: string
        - name: gender
          in: query
          description: Filter by gender
          schema:
            type: string
            enum: [male, female]
        - name: color
          in: query
          description: Filter by color
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Alpaca'
                      pagination:
                        $ref: '#/components/schemas/PaginationInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'  
# Health Records endpoints
