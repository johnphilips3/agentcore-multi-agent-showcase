          type: number
          format: float
          description: Staple length in inches
          minimum: 1
          maximum: 8
        crimp:
          type: string
          description: Fiber crimp description
          enum: [fine, medium, coarse]
        density:
          type: string
          description: Fiber density description
          enum: [light, medium, dense]

