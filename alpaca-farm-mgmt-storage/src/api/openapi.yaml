          type: string
          description: Alpaca name
          minLength: 1
          maxLength: 100
        registrationNumber:
          type: string
          description: Official registration number
          maxLength: 50
        birthDate:
          type: string
          format: date
          description: Birth date (ISO date format)
        gender:
          type: string
          enum: [male, female]
          description: Alpaca gender
        color:
          type: string
          description: Alpaca color
          minLength: 1
          maxLength: 50
        weight:
