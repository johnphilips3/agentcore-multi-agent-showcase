# SAM configuration file for alpaca-farm-mgmt-storage deployment
# More information about the configuration file can be found here:
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

[default]
[default.global.parameters]
stack_name = "alpaca-farm-mgmt-storage"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "alpaca-farm-mgmt-storage"
region = "us-east-1"
image_repositories = []
parameter_overrides = [
    "Stage=dev",
    "LambdaMemorySize=512",
    "LambdaTimeout=30", 
    "ReservedConcurrency=5",
    "LogRetentionDays=7"
    # RDS and VPC parameters will be provided via command line --parameter-overrides
    # Example VPC parameters (uncomment and modify as needed):
    # "VpcId=vpc-12345678",
    # "SubnetIds=subnet-12345678,subnet-87654321",
    # "SecurityGroupIds=sg-12345678"
]

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

# Development environment configuration - optimized for cost
[dev]
[dev.deploy.parameters]
stack_name = "alpaca-farm-mgmt-storage-dev"
parameter_overrides = [
    "Stage=dev",
    "LambdaMemorySize=512",
    "LambdaTimeout=30",
    "ReservedConcurrency=3",
    "LogRetentionDays=3"
    # RDS parameters will be provided via command line --parameter-overrides
]

# Staging environment configuration - balanced cost and performance
[staging]
[staging.deploy.parameters]
stack_name = "alpaca-farm-mgmt-storage-staging"
parameter_overrides = [
    "Stage=staging",
    "LambdaMemorySize=512", 
    "LambdaTimeout=30",
    "ReservedConcurrency=5",
    "LogRetentionDays=7"
    # RDS parameters will be provided via command line --parameter-overrides
]

# Production environment configuration - optimized for performance with cost controls
[prod]
[prod.deploy.parameters]
stack_name = "alpaca-farm-mgmt-storage-prod"
parameter_overrides = [
    "Stage=prod",
    "LambdaMemorySize=1024",
    "LambdaTimeout=60",
    "ReservedConcurrency=10", 
    "LogRetentionDays=30"
    # RDS parameters will be provided via command line --parameter-overrides
]